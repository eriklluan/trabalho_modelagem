<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="620" viewBox="0 0 1900 620">
  <defs>
    <style>
      .title { font: 700 28px Arial, sans-serif; fill: #172033; }
      .lane { fill: #f7f9fc; stroke: #334e68; stroke-width: 2; }
      .laneTitle { font: 700 16px Arial, sans-serif; fill: #172033; }
      .task { fill: #ffffff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .service { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .event { fill: #ffffff; stroke: #172033; stroke-width: 2; }
      .end { fill: #ffffff; stroke: #172033; stroke-width: 4; }
      .gateway { fill: #ffffff; stroke: #d97706; stroke-width: 2; }
      .label { font: 13px Arial, sans-serif; fill: #172033; }
      .small { font: 12px Arial, sans-serif; fill: #42526e; }
      .line { stroke: #42526e; stroke-width: 2; marker-end: url(#arrow); fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#42526e"/>
    </marker>
  </defs>

  <text x="40" y="45" class="title">BPMN - Publicacao, Entrega e Correcao de Atividade</text>

  <rect x="40" y="80" width="1780" height="150" class="lane"/><text x="60" y="160" class="laneTitle">Professor</text>
  <rect x="40" y="230" width="1780" height="170" class="lane"/><text x="60" y="320" class="laneTitle">Sistema</text>
  <rect x="40" y="400" width="1780" height="150" class="lane"/><text x="60" y="485" class="laneTitle">Estudante</text>

  <circle cx="180" cy="155" r="20" class="event"/><text x="140" y="195" class="small">Inicio</text>
  <rect x="240" y="115" width="150" height="80" class="task"/><text x="268" y="145" class="label">Criar atividade</text><text x="260" y="165" class="small">com prazo e turma</text>

  <rect x="435" y="275" width="155" height="80" class="service"/><text x="462" y="305" class="label">Validar permissao</text><text x="470" y="325" class="small">do professor</text>
  <polygon points="665,285 700,320 665,355 630,320" class="gateway"/><text x="615" y="375" class="small">Professor autorizado?</text>
  <circle cx="770" cy="320" r="20" class="end"/><text x="735" y="360" class="small">Negada</text>
  <rect x="750" y="115" width="145" height="80" class="task"/><text x="780" y="160" class="label">Publicar</text>

  <rect x="940" y="275" width="160" height="80" class="service"/><text x="970" y="305" class="label">Notificar</text><text x="970" y="325" class="small">estudantes</text>
  <rect x="1150" y="435" width="150" height="80" class="task"/><text x="1180" y="480" class="label">Acessar atividade</text>
  <rect x="1340" y="435" width="150" height="80" class="task"/><text x="1372" y="470" class="label">Enviar resposta</text><text x="1390" y="490" class="small">ou arquivo</text>
  <rect x="1530" y="275" width="150" height="80" class="service"/><text x="1560" y="305" class="label">Registrar entrega</text><text x="1570" y="325" class="small">e horario</text>
  <polygon points="1755,285 1790,320 1755,355 1720,320" class="gateway"/><text x="1690" y="375" class="small">Dentro do prazo?</text>
  <rect x="1650" y="115" width="150" height="80" class="task"/><text x="1682" y="160" class="label">Corrigir</text>
  <rect x="1440" y="115" width="150" height="80" class="task"/><text x="1468" y="145" class="label">Registrar nota</text><text x="1478" y="165" class="small">e feedback</text>
  <rect x="1220" y="275" width="160" height="80" class="service"/><text x="1255" y="305" class="label">Liberar</text><text x="1245" y="325" class="small">resultado</text>
  <rect x="980" y="435" width="150" height="80" class="task"/><text x="1008" y="470" class="label">Consultar nota</text><text x="1018" y="490" class="small">e feedback</text>
  <circle cx="910" cy="475" r="20" class="end"/><text x="865" y="515" class="small">Fim</text>

  <path d="M200 155 L240 155" class="line"/>
  <path d="M390 155 C420 155 410 315 435 315" class="line"/>
  <path d="M590 315 L630 320" class="line"/>
  <path d="M700 320 L750 320" class="line"/><text x="710" y="305" class="small">Nao</text>
  <path d="M665 285 C665 155 720 155 750 155" class="line"/><text x="685" y="150" class="small">Sim</text>
  <path d="M895 155 C920 155 910 315 940 315" class="line"/>
  <path d="M1100 315 C1130 315 1120 475 1150 475" class="line"/>
  <path d="M1300 475 L1340 475" class="line"/>
  <path d="M1490 475 C1520 475 1505 315 1530 315" class="line"/>
  <path d="M1680 315 L1720 320" class="line"/>
  <path d="M1755 285 C1755 220 1745 195 1725 195" class="line"/><text x="1770" y="250" class="small">Sim</text>
  <path d="M1720 320 C1660 390 1610 250 1650 195" class="line"/><text x="1670" y="365" class="small">Nao: marcar atraso</text>
  <path d="M1650 155 L1590 155" class="line"/>
  <path d="M1440 155 C1400 155 1390 315 1380 315" class="line"/>
  <path d="M1220 315 C1180 315 1160 475 1130 475" class="line"/>
  <path d="M980 475 L930 475" class="line"/>
</svg>